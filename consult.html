<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consult Us – Cititrust</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fa;
      color: #1a2430;
    }
    .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 48px;
      box-shadow: 0 4px 24px rgba(10,42,74,0.08);
      border: 1px solid #e4e7ec;
    }
    .card .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .card .logo img { height: 48px; width: auto; }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #0a2a4a;
      margin-bottom: 6px;
      text-align: center;
    }
    .sub {
      text-align: center;
      color: #6b7a8f;
      font-size: 1rem;
      margin-bottom: 28px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      color: #2d3a4a;
      margin-bottom: 4px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #cdd2d9;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: 0.2s;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #c9a84c;
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    }
    .form-group textarea { min-height: 120px; resize: vertical; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 32px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.25s;
      background: #c9a84c;
      color: #fff;
      width: 100%;
    }
    .btn:hover { background: #a8892f; transform: translateY(-1px); }
    .btn-outline {
      background: transparent;
      border: 2px solid #0a2a4a;
      color: #0a2a4a;
      margin-top: 12px;
    }
    .btn-outline:hover { background: #0a2a4a; color: #fff; }
    .success-msg {
      display: none;
      background: #dcfce7;
      color: #166534;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      font-weight: 600;
      border-left: 4px solid #16a34a;
    }
    .success-msg.show { display: block; }
    .back-link {
      display: inline-block;
      margin-top: 16px;
      color: #6b7a8f;
      text-decoration: none;
      font-weight: 500;
    }
    .back-link i { margin-right: 6px; }
    .back-link:hover { color: #0a2a4a; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width:640px) { .row { grid-template-columns: 1fr; } .card { padding: 24px 20px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <img src="https://i0.wp.com/cititrustassetmgt.com/wp-content/uploads/2020/08/NEW-DESIGN-CITITRUST-ASSET-MANAGEMENT-logo.jpg?w=580&ssl=1" alt="Cititrust" />
      </div>
      <h1>Consult Us</h1>
      <p class="sub">Tell us about your needs and we'll get back to you promptly.</p>

      <form id="consultForm">
        <div class="row">
          <div class="form-group">
            <label><i class="fas fa-user"></i> Full Name</label>
            <input type="text" id="fullName" required placeholder="e.g. Kwame Mensah" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" id="email" required placeholder="you@example.com" />
          </div>
        </div>
        <div class="form-group">
          <label><i class="fas fa-phone"></i> Phone Number</label>
          <input type="tel" id="phone" placeholder="+233 XX XXX XXXX" />
        </div>
        <div class="form-group">
          <label><i class="fas fa-briefcase"></i> Service / Product of Interest</label>
          <select id="service">
            <option value="">Select a service...</option>
            <option value="Trust Fund Management">Trust Fund Management</option>
            <option value="Portfolio Management">Portfolio Management</option>
            <option value="Investment Advisory">Investment Advisory</option>
            <option value="Mutual Funds">Mutual Funds</option>
            <option value="Real Estate Investment">Real Estate Investment</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label><i class="fas fa-comment"></i> Your Message</label>
          <textarea id="message" required placeholder="Describe your needs, questions, or the help you require..."></textarea>
        </div>
        <button type="submit" class="btn"><i class="fas fa-paper-plane"></i> Send Enquiry</button>
      </form>

      <div class="success-msg" id="successMsg">
        <i class="fas fa-check-circle" style="font-size:1.4rem;margin-right:8px;"></i>
        Your enquiry has been sent. We'll respond within 24 hours.
      </div>

      <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
  </div>

  <script>
    document.getElementById('consultForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // Collect data
      const name = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const service = document.getElementById('service').value;
      const message = document.getElementById('message').value.trim();

      if (!name || !email || !message) {
        alert('Please fill in all required fields.');
        return;
      }

      // Send to consult@cititrustgh.com via mailto (fallback) or use a service.
      // We'll use a mailto: with subject and body.
      const subject = `Consultation Request from ${name}`;
      const body = `Name: ${name}\nEmail: ${email}\nPhone: ${phone}\nService: ${service}\n\nMessage:\n${message}`;
      window.location.href = `mailto:consult@cititrustgh.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

      // Show success message
      document.getElementById('successMsg').classList.add('show');
      document.getElementById('consultForm').reset();
      // Optionally hide after 5 seconds
      setTimeout(() => {
        document.getElementById('successMsg').classList.remove('show');
      }, 8000);
    });
  </script>
</body>
</html>
